    <title>Aara: Your AI Stylist</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes scanline {
        0% { transform: translateY(-10px); }
        100% { transform: translateY(calc(100% + 10px)); }
      }
      body {
        color: #44403C; /* Tailwind stone-700 */
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
        background: linear-gradient(135deg, #FFF7ED 0%, #FEF2F2 50%, #F0FDFA 100%);
        min-height: 100vh;
      }
      .scanline {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(to bottom, rgba(251, 146, 60, 0), rgba(251, 146, 60, 0.6), rgba(251, 146, 60, 0));
        animation: scanline 2s ease-in-out infinite;
        opacity: 0.6;
      }
    </style>
